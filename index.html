<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F7F5F0">
<title>Habits</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:#F7F5F0;font-family:'DM Sans',-apple-system,sans-serif;color:#1B1B18;overflow-x:hidden}
  html{padding:env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left)}
  #loading{display:flex;align-items:center;justify-content:center;height:100vh;font-family:'DM Sans',sans-serif;color:#A3A394;font-size:15px}

  /* Bottom nav */
  .bottom-nav{
    position:fixed;bottom:0;left:50%;transform:translateX(-50%);
    width:100%;max-width:480px;
    background:rgba(247,245,240,0.92);
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border-top:1px solid #E8E4DC;
    display:flex;align-items:stretch;
    padding-bottom:env(safe-area-inset-bottom);
    z-index:100;
  }
  .nav-btn{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:10px 0 8px;gap:4px;
    background:none;border:none;cursor:pointer;
    font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;
    letter-spacing:0.05em;text-transform:uppercase;
    color:#A3A394;transition:color .15s;
  }
  .nav-btn.active{color:#2D6A4F}
  .nav-btn svg{transition:transform .15s}
  .nav-btn.active svg{transform:scale(1.1)}

  /* Past-day log modal */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(27,27,24,.45);
    display:flex;align-items:flex-end;justify-content:center;
    z-index:200;animation:fadeIn .2s ease;
    overflow-y:auto;-webkit-overflow-scrolling:touch;
  }
  .modal-sheet{
    background:#F7F5F0;border-radius:24px 24px 0 0;
    width:100%;max-width:480px;
    padding:0 0 calc(env(safe-area-inset-bottom) + 16px);
    flex-shrink:0;overflow-y:visible;
    animation:slideUp .25s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}

  /* Heatmap */
  .heatmap-cell{
    width:100%;aspect-ratio:1;border-radius:4px;
    cursor:pointer;transition:transform .1s,opacity .1s;
  }
  .heatmap-cell:hover{transform:scale(1.15);opacity:.85}

  /* Card entrance animation */
  @keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .card-enter{animation:cardIn .35s cubic-bezier(.22,1,.36,1) both}

  /* Button press */
  .press-btn{transition:transform .1s,opacity .1s}
  .press-btn:active{transform:scale(0.94);opacity:0.85}

  /* Tab fade */
  @keyframes tabFade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .tab-fade{animation:tabFade .22s ease both}

  /* Scroll area above bottom nav */
  .scroll-area{padding-bottom:calc(68px + env(safe-area-inset-bottom))}
</style>
</head>
<body>
<div id="root"><div id="loading">Loading...</div></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-is@18/umd/react-is.production.min.js" crossorigin></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js" crossorigin></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>

<script type="text/babel" data-type="module">
const {useState, useEffect, useCallback, useMemo, useRef} = React;
const {BarChart, Bar, LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell, ReferenceLine} = Recharts;

// ─── Storage ───
const SK = "habitTracker_v1";
const load = () => { try { const d=JSON.parse(localStorage.getItem(SK))||{habits:[],logs:{},todos:[]}; return {...d,todos:d.todos||[]}; } catch(e) { return {habits:[],logs:{},todos:[]}; } };
const persist = (d) => localStorage.setItem(SK, JSON.stringify(d));

// ─── Dates ───
const fmt = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const today = () => fmt(new Date());
const weekStart = (ds) => { const d=new Date(ds+"T00:00:00"); const dy=d.getDay(); d.setDate(d.getDate()-(dy===0?6:dy-1)); return fmt(d); };
const daysInRange = (a,b) => { const r=[],d=new Date(a+"T00:00:00"),e=new Date(b+"T00:00:00"); while(d<=e){r.push(fmt(d));d.setDate(d.getDate()+1);} return r; };
const weekDaysOf = (ds) => { const ws=weekStart(ds); const ed=new Date(ws+"T00:00:00"); ed.setDate(ed.getDate()+6); return daysInRange(ws,fmt(ed)); };
const dayLbl = (ds) => ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"][(()=>{const dy=new Date(ds+"T00:00:00").getDay(); return dy===0?6:dy-1;})()];
const weeksBack = (n) => { const w=[],d=new Date(); for(let i=n-1;i>=0;i--){const x=new Date(d);x.setDate(x.getDate()-i*7);w.push(weekStart(fmt(x)));} return [...new Set(w)].slice(-n); };
const monthName = (ds) => new Date(ds+"T00:00:00").toLocaleString("en-US",{month:"short"});
const addDays = (ds, n) => { const d=new Date(ds+"T00:00:00"); d.setDate(d.getDate()+n); return fmt(d); };

// ─── Theme ───
const C = {
  bg:"#F7F5F0",card:"#FFF",cb:"#E8E4DC",pri:"#2D6A4F",pg:"#D8F3DC",
  acc:"#E76F51",txt:"#1B1B18",ts:"#6B6B60",tm:"#A3A394",ok:"#40916C",pb:"#EDEBE5",
  over:"#2D6A4F", under:"#1982C4", underPg:"#DBEEFF",
  sh:"0 1px 3px rgba(27,27,24,.06),0 1px 2px rgba(27,27,24,.04)",
  shL:"0 4px 12px rgba(27,27,24,.08),0 2px 4px rgba(27,27,24,.04)",
};

// ─── Icons ───
const Ico = ({t,sz=20,c=C.ts}) => {
  const s={width:sz,height:sz,display:"inline-block",flexShrink:0};
  const m={
    plus:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
    chart:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>,
    back:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,
    fire:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 12c2-2.96 0-7-1-8 0 3.038-1.773 4.741-3 6-1.226 1.26-2 3.24-2 5a6 6 0 1 0 12 0c0-1.532-1.056-3.94-2-5-1.786 3-2.791 3-4 2z"/></svg>,
    trash:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
    edit:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
    minus:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2.5" strokeLinecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>,
    clock:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
    target:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
    arrowUp:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>,
    arrowDown:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>,
    home:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
    grid:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>,
    calendar:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
    settings:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
    download:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
    upload:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
    shield:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
    check:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
    flag:<svg style={s} viewBox="0 0 24 24" fill={c==="#E76F51"?c:"none"} stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>,
    repeat:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>,
    todoList:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><polyline points="3 6 4 7 6 5"/><polyline points="3 12 4 13 6 11"/><polyline points="3 18 4 19 6 17"/></svg>,
    close:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
  };
  return m[t]||null;
};

// ─── Progress bar ───
const PBar = ({val, max, color=C.pri}) => {
  const pct = Math.min((val / max) * 100, 100);
  return (
    <div style={{width:"100%",height:8,borderRadius:99,background:C.pb,overflow:"hidden"}}>
      <div style={{height:"100%",borderRadius:99,width:`${pct}%`,background:color,transition:"width .4s cubic-bezier(.34,1.56,.64,1)"}}/>
    </div>
  );
};

// ─── App ───
function App() {
  const [data,setData]=useState(load);
  const [view,setView]=useState("home");   // home | add | edit | stats | todoAdd | todoEdit
  const [tab,setTab]=useState("today");    // today | todos | heatmap | settings
  const [selH,setSelH]=useState(null);
  const [edH,setEdH]=useState(null);
  const [edT,setEdT]=useState(null);
  const [pastLogModal,setPastLogModal]=useState(null);

  useEffect(()=>{persist(data);},[data]);

  const ts=today();
  const wd=useMemo(()=>weekDaysOf(ts),[ts]);
  const gl=useCallback((id,d)=>data.logs[`${id}:${d}`]||0,[data.logs]);

  const addH=useCallback(h=>setData(p=>({...p,habits:[...p.habits,{...h,id:Date.now().toString()}]})),[]);
  const updH=useCallback((id,u)=>setData(p=>({...p,habits:p.habits.map(h=>h.id===id?{...h,...u}:h)})),[]);
  const delH=useCallback(id=>setData(p=>({...p,habits:p.habits.filter(h=>h.id!==id),logs:Object.fromEntries(Object.entries(p.logs).filter(([k])=>!k.startsWith(id+":")))})),[]);
  const setLog=useCallback((id,ds,val)=>setData(p=>({...p,logs:{...p.logs,[`${id}:${ds}`]:Math.max(0,val)}})),[]);
  const addTodo=useCallback(t=>setData(p=>({...p,todos:[...p.todos,{...t,id:Date.now().toString()}]})),[]);
  const updTodo=useCallback((id,u)=>setData(p=>({...p,todos:p.todos.map(t=>t.id===id?{...t,...u}:t)})),[]);
  const delTodo=useCallback(id=>setData(p=>({...p,todos:p.todos.filter(t=>t.id!==id)})),[]);

  const streak=useCallback(h=>{
    let s=0;
    const isUnder = h.type==="counter" && h.direction==="under";
    const hitDay = (v, hasLog) => {
      if(h.type==="time") return v>=h.goal;
      if(h.type==="counter") return isUnder ? (hasLog && v<=h.goal) : v>=h.goal;
      return v>=h.goal;
    };
    if(h.cycle==="daily"){
      const d=new Date();
      for(let i=0;i<365;i++){
        const ds=fmt(d);
        const hasLog = (`${h.id}:${ds}`) in data.logs;
        const v=gl(h.id,ds);
        if(hitDay(v,hasLog))s++;
        else if(i>0)break;
        d.setDate(d.getDate()-1);
      }
    } else {
      const w=new Date(weekStart(today())+"T00:00:00");
      for(let i=0;i<52;i++){
        const ds=weekDaysOf(fmt(w));
        const tot=ds.reduce((a,d)=>a+gl(h.id,d),0);
        const hasLog=ds.some(d=>(`${h.id}:${d}`) in data.logs);
        let hit;
        if(h.type==="time") hit=tot>=h.goal*7;
        else if(h.type==="counter") hit=isUnder ? (hasLog && tot<=h.goal) : tot>=h.goal;
        else hit=tot>=h.goal;
        if(hit)s++;
        else if(i>0)break;
        w.setDate(w.getDate()-7);
      }
    }
    return s;
  },[gl, data.logs]);

  const ft=m=>{if(m<60)return`${m}m`;const h=Math.floor(m/60),r=m%60;return r>0?`${h}h ${r}m`:`${h}h`;};
  const fi=m=>{if(m<60)return`${m}m`;if(m%60===0)return`${m/60}h`;return`${Math.floor(m/60)}h${m%60}m`;};

  const prog=h=>{
    const tv=gl(h.id,ts),wt=wd.reduce((s,d)=>s+gl(h.id,d),0),isT=h.type==="time";
    const isCnt=h.type==="counter";
    let p,gd,cur;
    if(isCnt){
      const dir=h.direction||"over";
      const isWeekly=h.cycle==="weekly";
      const val=isWeekly?wt:tv;
      cur=`${val}`;
      gd=`${dir==="under"?"<":">"} ${h.goal}/${isWeekly?"wk":"day"}`;
      p = val/h.goal;
    } else if(isT){
      if(h.cycle==="daily"){p=tv/h.goal;cur=ft(tv);gd=ft(h.goal);}
      else{p=wt/(h.goal*7);cur=ft(wt);gd=ft(h.goal*7)+"/wk";}
    } else {
      if(h.cycle==="weekly"){p=wt/h.goal;cur=`${wt}`;gd=`${h.goal}×/wk`;}
      else{p=tv/h.goal;cur=`${tv}`;gd=`${h.goal}×/day`;}
    }
    return{p,cur,gd,tv,wt,isT,isCnt};
  };

  // ─── Confetti ───
  const [confetti, setConfetti] = useState(null);
  const firedToday = useRef({}); // {habitId: true} — once fired today, never fires again this session

  const launchConfetti = useCallback((e, color) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const x = rect.left + rect.width / 2;
    const y = rect.top + rect.height / 2;
    setConfetti({x, y, color, key: Date.now()});
    setTimeout(() => setConfetti(null), 1200);
  }, []);

  const Confetti = ({x, y, color}) => {
    const canvasRef = useRef(null);
    useEffect(() => {
      const canvas = canvasRef.current;
      if (!canvas) return;
      const ctx = canvas.getContext("2d");
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      const pieces = Array.from({length: 52}, () => ({
        x, y,
        vx: (Math.random() - 0.5) * 14,
        vy: Math.random() * -12 - 4,
        rot: Math.random() * 360,
        rotV: (Math.random() - 0.5) * 12,
        size: Math.random() * 7 + 4,
        color: [color, C.ok, "#E9C46A", "#fff", C.acc][Math.floor(Math.random() * 5)],
        shape: Math.random() > 0.5 ? "rect" : "circle",
        alpha: 1,
      }));
      let frame;
      const draw = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        pieces.forEach(p => {
          p.x += p.vx; p.y += p.vy; p.vy += 0.55;
          p.vx *= 0.98; p.rot += p.rotV; p.alpha -= 0.018;
          if (p.alpha <= 0) return;
          ctx.save();
          ctx.globalAlpha = Math.max(0, p.alpha);
          ctx.fillStyle = p.color;
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rot * Math.PI / 180);
          if (p.shape === "rect") ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size * 0.55);
          else { ctx.beginPath(); ctx.arc(0, 0, p.size/2, 0, Math.PI*2); ctx.fill(); }
          ctx.restore();
        });
        if (pieces.some(p => p.alpha > 0)) frame = requestAnimationFrame(draw);
      };
      draw();
      return () => cancelAnimationFrame(frame);
    }, []);
    return <canvas ref={canvasRef} style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:999}}/>;
  };

  const checkAndFire = useCallback((e, h, isT, inc) => {
    if (h.type === "counter") return;
    if (firedToday.current[h.id]) return; // already fired once this session for this habit
    const k = `${h.id}:${ts}`;
    const cur = data.logs[k] || 0;
    if (cur >= h.goal) return; // already done before this tap
    const next = cur + (isT ? inc : 1);
    if (next >= h.goal) {
      firedToday.current[h.id] = true; // lock it — will never fire again this session
      launchConfetti(e, h.color||C.pri);
    }
  }, [data.logs, ts, launchConfetti]);

  const doAdd=useCallback((id,isT,inc)=>setData(p=>{const k=`${id}:${ts}`,c=p.logs[k]||0;return{...p,logs:{...p.logs,[k]:c+(isT?inc:1)}};}),[ts]);
  const doSub=useCallback((id,isT,inc)=>setData(p=>{const k=`${id}:${ts}`,c=p.logs[k]||0;return{...p,logs:{...p.logs,[k]:Math.max(0,c-(isT?inc:1))}};}),[ts]);

  // ─── Shared styles ───
  const bGh={background:"transparent",color:C.ts,padding:"8px 12px",fontSize:14,border:"none",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:600,display:"inline-flex",alignItems:"center",gap:4};
  const tBtn={width:52,height:52,borderRadius:14,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:18,transition:"all .15s"};
  const crd={background:C.card,borderRadius:16,padding:"18px 20px",margin:"0 16px 12px",boxShadow:C.sh,border:`1px solid ${C.cb}`};
  const ipt={width:"100%",padding:"12px 16px",borderRadius:12,border:`1.5px solid ${C.cb}`,fontFamily:"'DM Sans',sans-serif",fontSize:15,color:C.txt,background:C.bg,outline:"none",boxSizing:"border-box"};
  const chip=a=>({padding:"8px 16px",borderRadius:99,border:`1.5px solid ${a?C.pri:C.cb}`,background:a?C.pg:"transparent",color:a?C.pri:C.ts,fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"});
  const lbl={fontSize:12,fontWeight:600,color:C.ts,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6,display:"block"};

  // ─── Habit card ───
  const card=h=>{
    const{p:pr,cur,gd,isT,isCnt}=prog(h);
    const inc=h.increment||60;
    const dir=h.direction||"over";
    const tv=gl(h.id,ts);
    const isWeekly=isCnt&&h.cycle==="weekly";
    const cntVal=isWeekly?wd.reduce((s,d)=>s+gl(h.id,d),0):tv;
    const isUnder = isCnt && dir==="under";
    const underOver = isUnder && cntVal>h.goal;
    const done = isUnder ? false : (isCnt ? cntVal>=h.goal : pr>=1);
    const st=streak(h);
    const habitColor = h.color||C.pri;

    return <div key={h.id} className="card-enter press-btn" style={{...crd,borderLeft:`4px solid ${habitColor}`,animationDelay:`${data.habits.indexOf(h)*0.05}s`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
            <span style={{fontSize:16,fontWeight:700}}>{h.name}</span>
            {done&&<span style={{fontSize:12,background:C.pg,color:C.ok,padding:"2px 8px",borderRadius:99,fontWeight:700}}>✓</span>}
            {underOver&&<span style={{fontSize:12,background:"#FFE8E3",color:C.acc,padding:"2px 8px",borderRadius:99,fontWeight:700}}>✗</span>}
            {isCnt&&<span style={{fontSize:11,display:"inline-flex",alignItems:"center",gap:3,background:dir==="under"?C.underPg:C.pg,color:dir==="under"?C.under:C.ok,padding:"2px 8px",borderRadius:99,fontWeight:700}}>
              <Ico t={dir==="under"?"arrowDown":"arrowUp"} sz={11} c={dir==="under"?C.under:C.ok}/>
              {dir==="under"?"Stay Under":"Stay Over"}
            </span>}
          </div>
          <div style={{fontSize:13,color:C.tm}}>
            {isCnt?`${cur} / ${gd}`:(isT?cur:`${cur}×`) + " / " + gd}
            {st>0&&<span style={{marginLeft:10,color:C.acc}}>🔥 {st} {h.cycle==="daily"?"day":"week"} streak</span>}
          </div>
        </div>
        <div style={{display:"flex",gap:4}}>
          <button style={{...bGh,padding:"6px 8px"}} title="Log past days" onClick={()=>setPastLogModal(h)}><Ico t="calendar" sz={18} c={C.tm}/></button>
          <button style={{...bGh,padding:"6px 8px"}} onClick={()=>{setSelH(h);setView("stats");}}><Ico t="chart" sz={18} c={C.tm}/></button>
        </div>
      </div>
      <PBar val={isCnt?cntVal:Math.min(pr,1)} max={isCnt?h.goal:1} color={habitColor}/>
      <div style={{display:"flex",alignItems:"center",gap:8,marginTop:14}}>
        <button className="press-btn" style={{...tBtn,background:C.bg,border:`1.5px solid ${C.cb}`}} onClick={()=>doSub(h.id,isT,inc)}><Ico t="minus" sz={18} c={C.ts}/></button>
        <button className="press-btn" style={{...tBtn,flex:1,borderRadius:14,background:habitColor,color:"#fff",fontSize:15,fontWeight:700,height:48}} onClick={e=>{checkAndFire(e,h,isT,inc);doAdd(h.id,isT,inc);}}>
          {isT?`+ ${fi(inc)}`:"+\u00a01"}
        </button>
      </div>
    </div>;
  };

  // ─── Past Day Log Modal ───
  const PastLogModal = ({habit:h, onClose}) => {
    const isT=h.type==="time", isCnt=h.type==="counter";
    const inc=h.increment||60;

    const days = useMemo(()=>{
      const out=[];
      for(let i=1;i<=14;i++){
        const d=new Date(); d.setDate(d.getDate()-i);
        const ds=fmt(d);
        out.push({ds, lbl:d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})});
      }
      return out;
    },[]);

    // Local copy of values — no parent re-renders on every tap
    const [localVals, setLocalVals] = useState(()=>{
      const init={};
      days.forEach(({ds})=>{ init[ds]=data.logs[`${h.id}:${ds}`]||0; });
      return init;
    });

    const adj = (ds, delta) => setLocalVals(prev=>({...prev,[ds]:Math.max(0,(prev[ds]||0)+delta)}));

    const hitDay=(val, ds)=>{
      if(h.type==="time") return val>=h.goal;
      if(h.type==="counter"){
        const dir=h.direction||"over";
        const hasLog = val>0;
        return dir==="under"?(hasLog&&val<=h.goal):val>=h.goal;
      }
      return val>=(h.cycle==="daily"?h.goal:1);
    };

    // Flush local state to parent on close
    const handleClose = () => {
      setData(p=>{
        const newLogs={...p.logs};
        days.forEach(({ds})=>{
          const k=`${h.id}:${ds}`;
          const v=localVals[ds]||0;
          if(v>0) newLogs[k]=v;
          else delete newLogs[k];
        });
        return {...p,logs:newLogs};
      });
      onClose();
    };

    return <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)handleClose();}}>
      <div className="modal-sheet">
        <div style={{display:"flex",justifyContent:"center",padding:"12px 0 0"}}>
          <div style={{width:36,height:4,borderRadius:99,background:C.cb}}/>
        </div>
        <div style={{padding:"16px 20px 8px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{fontFamily:"'DM Serif Display',serif",fontSize:22}}>{h.name}</div>
            <div style={{fontSize:12,color:C.tm,marginTop:2}}>Log past days</div>
          </div>
          <button style={{...bGh,padding:"6px 10px",fontSize:13}} onClick={handleClose}>Done</button>
        </div>
        <div style={{padding:"0 16px 24px"}}>
          {days.map(({ds,lbl:dl})=>{
            const val=localVals[ds]||0;
            const hit=hitDay(val,ds);
            return <div key={ds} style={{background:C.card,borderRadius:14,padding:"14px 16px",marginBottom:8,boxShadow:C.sh,border:`1px solid ${hit?C.ok+"44":C.cb}`,display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:6,height:36,borderRadius:99,background:hit?C.ok:C.pb,flexShrink:0}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:600,marginBottom:2}}>{dl}</div>
                <div style={{fontSize:12,color:C.tm}}>
                  {isT?ft(val):`${val}${isCnt?"":" ×"}`}
                  {hit&&<span style={{marginLeft:6,color:C.ok,fontWeight:700}}>✓ Done</span>}
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <button className="press-btn" style={{width:36,height:36,borderRadius:10,border:`1.5px solid ${C.cb}`,background:C.bg,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}
                  onClick={()=>adj(ds,-(isT?inc:1))}>
                  <Ico t="minus" sz={16} c={C.ts}/>
                </button>
                <div style={{width:44,textAlign:"center",fontSize:14,fontWeight:700,color:C.txt}}>
                  {isT?fi(val):val}
                </div>
                <button className="press-btn" style={{width:36,height:36,borderRadius:10,border:`1.5px solid ${C.cb}`,background:hit?C.pg:C.pri,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}
                  onClick={()=>adj(ds,(isT?inc:1))}>
                  <Ico t="plus" sz={16} c={hit?C.ok:"#fff"}/>
                </button>
              </div>
            </div>;
          })}
        </div>
      </div>
    </div>;
  };

  // ─── Heatmap Tab ───
  const HeatmapTab = () => {
    const [weekOffset, setWeekOffset] = useState(0);
    const [selHabit, setSelHabit] = useState(data.habits[0]||null);

    useEffect(()=>{
      if(!selHabit && data.habits.length>0) setSelHabit(data.habits[0]);
    },[data.habits]);

    if(data.habits.length===0) return (
      <div style={{textAlign:"center",padding:"60px 40px",color:C.tm}}>
        <div style={{fontSize:48,marginBottom:16}}>📅</div>
        <div style={{fontSize:17,fontWeight:600,color:C.txt,marginBottom:8}}>No habits yet</div>
        <div style={{fontSize:14,lineHeight:1.5}}>Create habits on the Today tab to see your heatmap here.</div>
      </div>
    );

    const todayDs = ts;
    const todayDate = new Date(todayDs+"T00:00:00");

    // ── Helpers ──
    const hexToRgb = hex => {
      const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
      return[r,g,b];
    };
    const interpolate = (t, hex) => {
      const [r,g,b]=hexToRgb(hex);
      const bg=[237,235,229];
      return `rgb(${Math.round(bg[0]+(r-bg[0])*t)},${Math.round(bg[1]+(g-bg[1])*t)},${Math.round(bg[2]+(b-bg[2])*t)})`;
    };

    const getDayIntensity = (hb, ds) => {
      const hbIsT=hb.type==="time", hbIsCnt=hb.type==="counter";
      const hbDir=hb.direction||"over";
      const v=gl(hb.id,ds);
      if(!v) return 0;
      if(hbIsT) return Math.min(v/hb.goal,1);
      if(hbIsCnt) return hbDir==="under"?(v<=hb.goal?1:0.25):Math.min(v/hb.goal,1);
      const goal=hb.cycle==="daily"?hb.goal:Math.ceil(hb.goal/7);
      return Math.min(v/Math.max(1,goal),1);
    };

    const getDayHit = (hb, ds) => {
      const v=gl(hb.id,ds);
      if(hb.type==="time") return v>=hb.goal;
      if(hb.type==="counter"){
        const hbDir=hb.direction||"over";
        const hasLog=(`${hb.id}:${ds}`) in data.logs;
        return hbDir==="under"?(hasLog&&v<=hb.goal):v>=hb.goal;
      }
      return v>=(hb.cycle==="daily"?hb.goal:1);
    };

    // ── Month calendar data ──
    const year = todayDate.getFullYear();
    const month = todayDate.getMonth();
    const monthFirstDs = `${year}-${String(month+1).padStart(2,'0')}-01`;
    const monthLastDs = fmt(new Date(year, month+1, 0));
    const monthDays = daysInRange(monthFirstDs, monthLastDs);
    const monthName2 = todayDate.toLocaleString("en-US",{month:"long",year:"numeric"});
    const firstDow = new Date(monthFirstDs+"T00:00:00").getDay();
    const offset = firstDow===0?6:firstDow-1;
    const DAY_LABELS = ["M","T","W","T","F","S","S"];

    const h = selHabit;
    const isT = h?.type==="time";
    const baseColor = h?.color||C.pri;

    const getDayHitSel = (ds) => h ? getDayHit(h, ds) : false;
    const monthPastDays = monthDays.filter(d=>d<=todayDs);
    const hitCount = monthPastDays.filter(d=>getDayHitSel(d)).length;
    const pct = monthPastDays.length>0?Math.round(hitCount/monthPastDays.length*100):0;
    const st = streak(h||data.habits[0]);

    // ── Week navigator data ──
    const refDate = new Date(todayDs+"T00:00:00");
    refDate.setDate(refDate.getDate()+weekOffset*7);
    const viewWs = weekStart(fmt(refDate));
    const viewDays = weekDaysOf(viewWs);
    const isCurrentWeek = weekOffset===0;
    const wkStartDate = new Date(viewWs+"T00:00:00");
    const wkEndDate = new Date(viewDays[6]+"T00:00:00");
    const wkLabel = `${wkStartDate.toLocaleString("en-US",{month:"short",day:"numeric"})} – ${wkEndDate.toLocaleString("en-US",{month:"short",day:"numeric"})}`;
    const DAY_SHORT = ["Mo","Tu","We","Th","Fr","Sa","Su"];
    const CELL = 32;

    const calcWeekScore = () => {
      let hits=0, possible=0;
      data.habits.forEach(hb=>{
        if(hb.cycle==="weekly"){
          possible++;
          const wt=viewDays.reduce((s,d)=>s+gl(hb.id,d),0);
          let hit=false;
          if(hb.type==="frequency") hit=wt>=hb.goal;
          else if(hb.type==="time") hit=wt>=hb.goal*7;
          else if(hb.type==="counter"){
            const dir=hb.direction||"over";
            const hasLog=viewDays.some(d=>(`${hb.id}:${d}`) in data.logs);
            hit=dir==="under"?(hasLog&&wt<=hb.goal):wt>=hb.goal;
          }
          if(hit) hits++;
        } else {
          viewDays.forEach(ds=>{
            if(ds>todayDs) return;
            possible++;
            if(getDayHit(hb,ds)) hits++;
          });
        }
      });
      return {hits, possible, pct:possible>0?Math.round(hits/possible*100):0};
    };
    const allScore = calcWeekScore();
    const dailyHabits = data.habits.filter(h=>h.cycle==="daily");
    const weeklyHabits = data.habits.filter(h=>h.cycle==="weekly");

    const HabitRow = ({hb}) => {
      const color=hb.color||C.pri;
      const isWeekly=hb.cycle==="weekly";
      if(isWeekly){
        const wt=viewDays.reduce((s,d)=>s+gl(hb.id,d),0);
        let intensity=0;
        if(hb.type==="frequency") intensity=Math.min(wt/hb.goal,1);
        else if(hb.type==="time") intensity=Math.min(wt/(hb.goal*7),1);
        else if(hb.type==="counter"){
          const dir=hb.direction||"over";
          intensity=dir==="under"?(wt<=hb.goal?1:0.25):Math.min(wt/hb.goal,1);
        }
        const bg=intensity===0?C.pb:interpolate(intensity,color);
        return (
          <div style={{display:"flex",alignItems:"center",marginBottom:6}}>
            <div style={{width:80,paddingRight:8,flexShrink:0}}>
              <div style={{fontSize:11,fontWeight:600,color:C.txt,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{hb.name}</div>
            </div>
            <div style={{flex:1,height:CELL,borderRadius:8,background:bg,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <span style={{fontSize:10,fontWeight:700,color:intensity>0.5?"rgba(255,255,255,0.9)":C.tm}}>
                {intensity>=1?"✓ Done":`${Math.round(intensity*100)}%`}
              </span>
            </div>
          </div>
        );
      }
      return (
        <div style={{display:"flex",alignItems:"center",marginBottom:6}}>
          <div style={{width:80,paddingRight:8,flexShrink:0}}>
            <div style={{fontSize:11,fontWeight:600,color:C.txt,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{hb.name}</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:`repeat(7,1fr)`,gap:3,flex:1}}>
            {viewDays.map(ds=>{
              const isFuture=ds>todayDs;
              const isToday=ds===todayDs;
              const intensity=isFuture?0:getDayIntensity(hb,ds);
              const bg=intensity===0?C.pb:interpolate(intensity,color);
              return (
                <div key={ds} style={{
                  aspectRatio:"1",borderRadius:6,background:bg,
                  border:isToday?`2px solid #1B1B18`:`2px solid transparent`,
                  opacity:isFuture?0.4:1,
                }}/>
              );
            })}
          </div>
        </div>
      );
    };

    return <div style={{padding:"0 16px"}}>

      {/* ── Habit selector pills ── */}
      <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:4,marginBottom:16,scrollbarWidth:"none"}}>
        {data.habits.map(hb=>(
          <button key={hb.id} onClick={()=>setSelHabit(hb)}
            style={{padding:"7px 14px",borderRadius:99,border:`1.5px solid ${selHabit?.id===hb.id?hb.color||C.pri:C.cb}`,background:selHabit?.id===hb.id?(hb.color||C.pri)+"18":"transparent",color:selHabit?.id===hb.id?hb.color||C.pri:C.ts,fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",whiteSpace:"nowrap",flexShrink:0}}>
            {hb.name}
          </button>
        ))}
      </div>

      {/* ── Stats row ── */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:16}}>
        {[
          {l:"This Month",v:`${pct}%`,sub:`${hitCount}/${monthPastDays.length} days`},
          {l:"Streak",v:`${st}`,sub:h?.cycle==="daily"?"days":"weeks"},
          {l:"Days Hit",v:`${hitCount}`,sub:"this month"},
        ].map((x,i)=>(
          <div key={i} style={{background:C.card,borderRadius:14,padding:"14px 12px",textAlign:"center",boxShadow:C.sh,border:`1px solid ${C.cb}`}}>
            <div style={{fontSize:22,fontWeight:700,fontFamily:"'DM Serif Display',serif",color:baseColor}}>{x.v}</div>
            <div style={{fontSize:11,color:C.tm,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",marginTop:2}}>{x.l}</div>
            <div style={{fontSize:11,color:C.tm,marginTop:1}}>{x.sub}</div>
          </div>
        ))}
      </div>

      {/* ── Month calendar heatmap ── */}
      <div style={{background:C.card,borderRadius:16,padding:"16px",boxShadow:C.sh,border:`1px solid ${C.cb}`,marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{fontSize:14,fontWeight:700,color:C.txt}}>{monthName2}</div>
          <div style={{display:"flex",alignItems:"center",gap:4}}>
            <span style={{fontSize:10,color:C.tm}}>Less</span>
            {[0,0.33,0.66,1].map(t=>(
              <div key={t} style={{width:10,height:10,borderRadius:2,background:t===0?C.pb:interpolate(t,baseColor)}}/>
            ))}
            <span style={{fontSize:10,color:C.tm}}>More</span>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:6,gap:4}}>
          {DAY_LABELS.map((d,i)=>(
            <div key={i} style={{textAlign:"center",fontSize:10,fontWeight:600,color:C.tm}}>{d}</div>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
          {Array.from({length:offset}).map((_,i)=>(<div key={`e${i}`} style={{aspectRatio:"1"}}/>))}
          {monthDays.map(ds=>{
            const isFuture=ds>todayDs;
            const isToday=ds===todayDs;
            const intensity=isFuture?0:getDayIntensity(h,ds);
            const bg=intensity===0?C.pb:interpolate(intensity,baseColor);
            const dayNum=new Date(ds+"T00:00:00").getDate();
            return (
              <div key={ds}>
                <div style={{aspectRatio:"1",borderRadius:8,background:bg,border:isToday?`2px solid #1B1B18`:`2px solid transparent`,display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <span style={{fontSize:9,fontWeight:isToday?700:500,color:intensity>0.5?"rgba(255,255,255,0.85)":C.tm,lineHeight:1}}>{dayNum}</span>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* ── Weekly Review ── */}
      <div style={{fontSize:11,fontWeight:700,color:C.tm,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10}}>Weekly Review</div>

      {/* Week navigator */}
      <div style={{background:C.card,borderRadius:16,padding:"14px 16px",boxShadow:C.sh,border:`1px solid ${C.cb}`,marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <button onClick={()=>setWeekOffset(w=>w-1)}
            style={{width:36,height:36,borderRadius:10,border:`1.5px solid ${C.cb}`,background:C.bg,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <Ico t="back" sz={18} c={C.ts}/>
          </button>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:14,fontWeight:700,color:C.txt}}>{isCurrentWeek?"This Week":wkLabel}</div>
            {isCurrentWeek&&<div style={{fontSize:11,color:C.tm,marginTop:1}}>{wkLabel}</div>}
          </div>
          <button onClick={()=>setWeekOffset(w=>Math.min(w+1,0))} disabled={weekOffset===0}
            style={{width:36,height:36,borderRadius:10,border:`1.5px solid ${C.cb}`,background:C.bg,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",opacity:weekOffset===0?0.3:1}}>
            <svg width={18} height={18} viewBox="0 0 24 24" fill="none" stroke={C.ts} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
            </svg>
          </button>
        </div>
        <div style={{marginTop:12,display:"flex",alignItems:"center",gap:10}}>
          <div style={{height:6,flex:1,borderRadius:99,background:C.pb,overflow:"hidden"}}>
            <div style={{height:"100%",borderRadius:99,width:`${allScore.pct}%`,background:C.pri,transition:"width .4s"}}/>
          </div>
          <div style={{fontSize:13,fontWeight:700,color:C.pri,minWidth:38,textAlign:"right"}}>{allScore.pct}%</div>
        </div>
        <div style={{fontSize:11,color:C.tm,textAlign:"center",marginTop:4}}>{allScore.hits} of {allScore.possible} habit-days completed</div>
      </div>

      {/* Habit grid */}
      <div style={{background:C.card,borderRadius:16,padding:"16px",boxShadow:C.sh,border:`1px solid ${C.cb}`,marginBottom:24}}>
        {/* Day headers */}
        <div style={{display:"flex",alignItems:"center",marginBottom:10}}>
          <div style={{width:80,flexShrink:0}}/>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,flex:1}}>
            {viewDays.map((ds,i)=>{

        </div>
        <button style={{border:"none",borderRadius:12,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:600,background:C.pri,color:"#fff",padding:"14px 24px",fontSize:15,width:"100%",display:"flex",alignItems:"center",justifyContent:"center"}} onClick={sv}>{ex?"Save Changes":"Create Habit"}</button>
        {ex&&<button style={{...bGh,width:"100%",marginTop:12,color:C.acc,justifyContent:"center"}} onClick={()=>{delH(ex.id);setView("home");setEdH(null);}}><Ico t="trash" sz={16} c={C.acc}/> Delete Habit</button>}

  };

  // ─── Stats view ───
  const Stats=({habit:h})=>{
    const isT=h.type==="time",isCnt=h.type==="counter",st=streak(h);
    const dir=h.direction||"over";
    const isWeeklyCnt=isCnt&&h.cycle==="weekly";
    const barColor = h.color||C.pri;
    const tv=gl(h.id,ts),wt=wd.reduce((s,d)=>s+gl(h.id,d),0);
    const weekHit = isCnt ? (dir==="under" ? wt>0 && wt<=h.goal : wt>=h.goal) : false;
    const wbd=wd.map(d=>{
      const v=gl(h.id,d);
      const hit=isT?v>=h.goal:isCnt?(isWeeklyCnt?weekHit:(dir==="under"?v<=h.goal:v>=h.goal)):v>=(h.cycle==="daily"?h.goal:1);
      return{day:dayLbl(d),value:v,goal:isWeeklyCnt?Math.round(h.goal/7*10)/10:h.goal,hit};
    });
    const wks=weeksBack(8);
    const td=wks.map(ws=>{
      const ds=weekDaysOf(ws);const tot=ds.reduce((s,d)=>s+gl(h.id,d),0);
      const dt=new Date(ws+"T00:00:00");
      const weekGoal=isT?Math.round(h.goal*7/60*10)/10:isCnt?h.goal:(h.cycle==="weekly"?h.goal:h.goal*7);
      return{week:`${dt.getDate()}/${dt.getMonth()+1}`,total:isT?Math.round(tot/60*10)/10:tot,weekGoal};
    });
    const ttStyle={borderRadius:10,border:`1px solid ${C.cb}`,boxShadow:C.sh,fontFamily:"'DM Sans',sans-serif",fontSize:13};
    const goalDesc=isT?`${ft(h.goal)} per ${h.cycle==="daily"?"day":"week"}`:isCnt?`${dir==="under"?"At most":"At least"} ${h.goal} per ${h.cycle==="weekly"?"week":"day"}`:`${h.goal}× per ${h.cycle==="daily"?"day":"week"}`;
    const todayVal=isCnt?(isWeeklyCnt?`${wt}`:`${tv}`):isT?ft(tv):`${tv}×`;
    const todayLbl=isWeeklyCnt?"This Week":"Today";
    return <>
      <div style={{padding:"24px 20px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <button style={{...bGh,padding:"8px 0"}} onClick={()=>{setView("home");setSelH(null);}}><Ico t="back" sz={20} c={C.txt}/><span style={{marginLeft:4,color:C.txt,fontWeight:600}}>Back</span></button>
        <button style={bGh} onClick={()=>{setEdH(h);setView("edit");}}><Ico t="edit" sz={18} c={C.ts}/></button>
      </div>
      <div style={{padding:"0 20px"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:24}}>
          <div style={{width:6,height:36,borderRadius:99,background:barColor}}/>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{fontFamily:"'DM Serif Display',serif",fontSize:28,fontWeight:400}}>{h.name}</div>
              {isCnt&&<span style={{fontSize:11,display:"inline-flex",alignItems:"center",gap:3,background:dir==="under"?C.underPg:C.pg,color:dir==="under"?C.under:C.ok,padding:"3px 10px",borderRadius:99,fontWeight:700}}>
                <Ico t={dir==="under"?"arrowDown":"arrowUp"} sz={11} c={dir==="under"?C.under:C.ok}/>
                {dir==="under"?"Stay Under":"Stay Over"}
              </span>}
            </div>
            <div style={{fontSize:13,color:C.tm}}>{goalDesc}</div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:24}}>
          {[{l:todayLbl,v:todayVal,i:"clock"},{l:"This Week",v:isCnt?`${wt}`:isT?ft(wt):`${wt}×`,i:"chart"},{l:"Streak",v:`${st} ${h.cycle==="daily"?"d":"w"}`,i:"fire"}].map((x,i)=>
            <div key={i} style={{background:C.card,borderRadius:14,padding:"14px 12px",textAlign:"center",boxShadow:C.sh,border:`1px solid ${C.cb}`}}>
              <div style={{marginBottom:6}}><Ico t={x.i} sz={18} c={barColor}/></div>
              <div style={{fontSize:20,fontWeight:700,fontFamily:"'DM Serif Display',serif"}}>{x.v}</div>
              <div style={{fontSize:11,color:C.tm,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",marginTop:2}}>{x.l}</div>
            </div>
          )}
        </div>
        <div style={{...crd,margin:"0 0 16px"}}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:16}}>This Week</div>
          <ResponsiveContainer width="100%" height={180}>
            <BarChart data={wbd} barCategoryGap="20%">
              <CartesianGrid strokeDasharray="3 3" stroke={C.cb} vertical={false}/>
              <XAxis dataKey="day" axisLine={false} tickLine={false} tick={{fill:C.tm,fontSize:12,fontWeight:500}}/>
              <YAxis hide/>
              <Tooltip contentStyle={ttStyle} formatter={(v,n)=>n==="goal"?(isCnt?`${v} target`:(isT?ft(v):`${v}× goal`)):(isCnt?`${v}`:(isT?ft(v):`${v}×`))}/>
              {isCnt&&<ReferenceLine y={h.goal} stroke={barColor} strokeDasharray="6 3" strokeWidth={1.5}/>}
              {(!isCnt)&&(isT||h.cycle==="daily")&&<Bar dataKey="goal" radius={[6,6,6,6]} fill={C.pb}/>}
              <Bar dataKey="value" radius={[6,6,6,6]}>
                {wbd.map((e,i)=><Cell key={i} fill={e.hit?barColor:C.tm+"40"}/>)}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </div>
        <div style={{...crd,margin:"0 0 16px"}}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:16}}>{isT?"Weekly Hours":isCnt?(isWeeklyCnt?"Weekly Totals — 8 Weeks":"Daily Counts — 8 Weeks"):"Weekly Completions"} — 8 Week Trend</div>
          <ResponsiveContainer width="100%" height={180}>
            <LineChart data={td}>
              <CartesianGrid strokeDasharray="3 3" stroke={C.cb} vertical={false}/>
              <XAxis dataKey="week" axisLine={false} tickLine={false} tick={{fill:C.tm,fontSize:11,fontWeight:500}}/>
              <YAxis hide/>
              <Tooltip contentStyle={ttStyle} formatter={(v,n)=>n==="total"?(isT?`${v}h`:`${v}`):(isT?`${v}h goal`:`${v} target`)}/>
              <Line type="monotone" dataKey="weekGoal" stroke={C.tm} strokeDasharray="6 3" strokeWidth={1.5} dot={false}/>
              <Line type="monotone" dataKey="total" stroke={barColor} strokeWidth={2.5} dot={{r:4,fill:barColor,strokeWidth:0}} activeDot={{r:6}}/>
            </LineChart>
          </ResponsiveContainer>
        </div>
      </div>
    </>;
  };

  // ─── Todo Tab ───
  const TodoTab = () => {
    const [filter, setFilter] = useState("active"); // active | done | all
    const ts = today();

    // todo shape: {id, text, done, flagged, dueDate, recur, completedOn}
    // recur: null | "daily" | "weekly" | "monthly"


    const toggleDone = (todo) => {
      if(todo.recur && !todo.done) {
        // Recurring: mark done for today, will reappear next cycle
        updTodo(todo.id, {done:true, completedOn:ts});
      } else {
        updTodo(todo.id, {done:!todo.done, completedOn:!todo.done?ts:null});
      }
    };

    // For recurring todos, figure out if they should appear as active today
    const isActiveToday = (todo) => {
      if(!todo.recur) return !todo.done;
      if(!todo.done) return true;
      const completed = todo.completedOn;
      if(!completed) return true;
      if(todo.recur==="daily") return completed < ts;
      if(todo.recur==="weekly") return weekStart(completed) < weekStart(ts);
      if(todo.recur==="monthly") {
        const c=new Date(completed+"T00:00:00"), n=new Date(ts+"T00:00:00");
        return c.getFullYear()!==n.getFullYear() || c.getMonth()!==n.getMonth();
      }
      return false;
    };

    const isOverdue = (todo) => todo.dueDate && todo.dueDate < ts && !todo.done && isActiveToday(todo);
    const isDueToday = (todo) => todo.dueDate === ts;
    const isDueSoon = (todo) => {
      if(!todo.dueDate || todo.done) return false;
      const diff = (new Date(todo.dueDate+"T00:00:00") - new Date(ts+"T00:00:00")) / 86400000;
      return diff > 0 && diff <= 2;
    };

    const fmtDue = (ds) => {
      const d = new Date(ds+"T00:00:00"), n = new Date(ts+"T00:00:00");
      const diff = Math.round((d-n)/86400000);
      if(diff===0) return "Today";
      if(diff===1) return "Tomorrow";
      if(diff===-1) return "Yesterday";
      if(diff<0) return `${Math.abs(diff)}d overdue`;
      if(diff<=6) return `${diff}d`;
      return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
    };

    const visibleTodos = (data.todos||[]).filter(t => {
      if(filter==="active") return isActiveToday(t) || (!t.recur && !t.done);
      if(filter==="done") return t.done && !isActiveToday(t);
      return true;
    }).sort((a,b) => {
      // Sort: flagged first, then by due date, then by creation
      if(a.flagged&&!b.flagged) return -1;
      if(!a.flagged&&b.flagged) return 1;
      if(a.dueDate&&!b.dueDate) return -1;
      if(!a.dueDate&&b.dueDate) return 1;
      if(a.dueDate&&b.dueDate) return a.dueDate.localeCompare(b.dueDate);
      return a.id.localeCompare(b.id);
    });

    const flaggedCount = (data.todos||[]).filter(t=>t.flagged&&isActiveToday(t)).length;
    const activeCount = (data.todos||[]).filter(t=>isActiveToday(t)||(!t.recur&&!t.done)).length;
    const doneCount = (data.todos||[]).filter(t=>t.done&&!isActiveToday(t)).length;

    // ── Todo Form (add/edit sheet) ──
    return <>
      {/* Header */}
      <div style={{padding:"24px 20px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{fontSize:13,color:C.tm,fontWeight:500,letterSpacing:"0.04em",textTransform:"uppercase"}}>{new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</div>
          <div style={{fontFamily:"'DM Serif Display',serif",fontSize:28,fontWeight:400,letterSpacing:"-0.02em"}}>To-do</div>
        </div>
        <button className="press-btn" style={{width:44,height:44,borderRadius:14,background:C.pri,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:C.shL}} onClick={()=>{setEdT(null);setView("todoAdd");}}>
          <Ico t="plus" sz={20} c="#fff"/>
        </button>
      </div>

      {/* Filter pills */}
      <div style={{display:"flex",gap:8,padding:"0 20px 16px"}}>
        {[{l:`Active${activeCount>0?` (${activeCount})`:""}`,v:"active"},{l:`Done${doneCount>0?` (${doneCount})`:""}`,v:"done"},{l:"All",v:"all"}].map(f=>(
          <button key={f.v} onClick={()=>setFilter(f.v)}
            style={{padding:"7px 14px",borderRadius:99,border:`1.5px solid ${filter===f.v?C.pri:C.cb}`,background:filter===f.v?C.pg:"transparent",color:filter===f.v?C.pri:C.ts,fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>
            {f.l}
          </button>
        ))}
      </div>

      {/* Todo list */}
      <div style={{padding:"0 16px"}}>
        {visibleTodos.length===0&&(
          <div style={{textAlign:"center",padding:"50px 20px",color:C.tm}}>
            <div style={{fontSize:40,marginBottom:12}}>{filter==="done"?"✅":"📋"}</div>
            <div style={{fontSize:16,fontWeight:600,color:C.txt,marginBottom:6}}>
              {filter==="done"?"Nothing completed yet":filter==="active"?"All clear!":"No to-dos yet"}
            </div>
            <div style={{fontSize:13,lineHeight:1.5}}>
              {filter==="active"?"Tap + to add your first to-do":""}
            </div>
          </div>
        )}

        {visibleTodos.map((todo,i)=>{
          const overdue = isOverdue(todo);
          const dueToday = isDueToday(todo);
          const dueSoon = isDueSoon(todo);
          const active = isActiveToday(todo) || (!todo.recur&&!todo.done);

          return (
            <div key={todo.id} className="card-enter" style={{animationDelay:`${i*0.04}s`,
              background:C.card,borderRadius:14,padding:"14px 14px 14px 8px",
              marginBottom:8,boxShadow:C.sh,
              border:`1px solid ${overdue?C.acc+"55":todo.flagged&&active?"#E9C46A55":C.cb}`,
              borderLeft:`4px solid ${overdue?C.acc:todo.flagged&&active?"#E9C46A":todo.done?C.pb:C.pri}`,
              display:"flex",alignItems:"flex-start",gap:10,opacity:todo.done&&!active?0.55:1}}>

              {/* Checkbox */}
              <button className="press-btn" onClick={()=>toggleDone(todo)} style={{flexShrink:0,marginTop:1,width:24,height:24,borderRadius:7,border:`2px solid ${todo.done&&!active?C.ok:todo.flagged?C.acc:C.pri}`,background:todo.done&&!active?C.ok:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .15s"}}>
                {(todo.done&&!active)&&<Ico t="check" sz={13} c="#fff"/>}
              </button>

              {/* Content */}
              <div style={{flex:1,minWidth:0}} onClick={()=>{setEdT(todo);setView("todoEdit");}}>
                <div style={{fontSize:14,fontWeight:600,color:todo.done&&!active?C.tm:C.txt,textDecoration:todo.done&&!active?"line-through":"none",lineHeight:1.4,marginBottom:4,wordBreak:"break-word"}}>
                  {todo.text}
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:5,alignItems:"center"}}>
                  {todo.flagged&&active&&<span style={{display:"inline-flex",alignItems:"center",gap:3,fontSize:11,fontWeight:700,color:C.acc,background:"#FFF3EE",padding:"2px 7px",borderRadius:99}}>
                    <Ico t="flag" sz={10} c={C.acc}/>Priority
                  </span>}
                  {todo.recur&&<span style={{display:"inline-flex",alignItems:"center",gap:3,fontSize:11,fontWeight:600,color:C.ts,background:C.pb,padding:"2px 7px",borderRadius:99}}>
                    <Ico t="repeat" sz={10} c={C.ts}/>{todo.recur}
                  </span>}
                  {todo.dueDate&&<span style={{fontSize:11,fontWeight:600,padding:"2px 7px",borderRadius:99,
                    background:overdue?"#FFF0EE":dueToday?C.pg:dueSoon?"#FFFBEE":C.pb,
                    color:overdue?C.acc:dueToday?C.ok:dueSoon?"#B45309":C.ts}}>
                    {overdue&&"⚠ "}{fmtDue(todo.dueDate)}
                  </span>}
                </div>
              </div>

              {/* Flag quick-toggle */}
              <button className="press-btn" onClick={()=>updTodo(todo.id,{flagged:!todo.flagged})} style={{flexShrink:0,background:"none",border:"none",cursor:"pointer",padding:"2px 0 0 4px"}}>
                <Ico t="flag" sz={17} c={todo.flagged?C.acc:C.cb}/>
              </button>
            </div>
          );
        })}
      </div>

    </>;
  };

  // ─── Todo Form View (full page, like FormView) ───
  const TodoFormView = ({existing:ex}) => {
    const [text, setText] = useState(ex?.text||"");
    const [flagged, setFlagged] = useState(ex?.flagged||false);
    const [dueDate, setDueDate] = useState(ex?.dueDate||"");
    const [recur, setRecur] = useState(ex?.recur||null);

    const recurOpts = [{l:"None",v:null},{l:"Daily",v:"daily"},{l:"Weekly",v:"weekly"},{l:"Monthly",v:"monthly"}];
    const ipt={width:"100%",padding:"12px 16px",borderRadius:12,border:`1.5px solid ${C.cb}`,fontFamily:"'DM Sans',sans-serif",fontSize:15,color:C.txt,background:C.bg,outline:"none",boxSizing:"border-box"};
    const lbl={fontSize:12,fontWeight:600,color:C.ts,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6,display:"block"};
    const chip=a=>({padding:"8px 16px",borderRadius:99,border:`1.5px solid ${a?C.pri:C.cb}`,background:a?C.pg:"transparent",color:a?C.pri:C.ts,fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"});

    const save = () => {
      if(!text.trim()) return;
      const t = {text:text.trim(), flagged, dueDate:dueDate||null, recur, done:ex?.done||false, completedOn:ex?.completedOn||null};
      if(ex) updTodo(ex.id, t); else addTodo(t);
      setView("home"); setEdT(null);
    };

    return <>
      <div style={{padding:"24px 20px 16px",display:"flex",alignItems:"center"}}>
        <button style={{background:"transparent",color:C.ts,padding:"8px 0",fontSize:14,border:"none",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:600,display:"inline-flex",alignItems:"center",gap:4}}
          onClick={()=>{setView("home");setEdT(null);}}>
          <svg width={20} height={20} viewBox="0 0 24 24" fill="none" stroke={C.txt} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          <span style={{marginLeft:4,color:C.txt,fontWeight:600}}>Back</span>
        </button>
      </div>
      <div style={{padding:"0 20px"}}>
        <div style={{fontFamily:"'DM Serif Display',serif",fontSize:28,fontWeight:400,marginBottom:24}}>{ex?"Edit To-do":"New To-do"}</div>

        <div style={{marginBottom:20}}>
          <label style={lbl}>What needs to be done?</label>
          <textarea value={text} onChange={e=>setText(e.target.value)}
            style={{...ipt,resize:"none",minHeight:88,lineHeight:1.5}}
            placeholder="e.g. Buy groceries, Call dentist..."/>
        </div>

        <div style={{marginBottom:20}}>
          <label style={lbl}>Priority</label>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px",background:C.card,borderRadius:12,border:`1.5px solid ${flagged?"#E76F51":C.cb}`}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <Ico t="flag" sz={18} c={flagged?C.acc:C.tm}/>
              <span style={{fontSize:14,fontWeight:600,color:flagged?C.acc:C.txt}}>Flag as priority</span>
            </div>
            <button onClick={()=>setFlagged(f=>!f)} style={{width:44,height:26,borderRadius:99,background:flagged?C.acc:C.pb,border:"none",cursor:"pointer",position:"relative",transition:"background .2s",flexShrink:0}}>
              <div style={{position:"absolute",top:3,left:flagged?21:3,width:20,height:20,borderRadius:99,background:"#fff",boxShadow:"0 1px 3px rgba(0,0,0,.2)",transition:"left .2s"}}/>
            </button>
          </div>
        </div>

        <div style={{marginBottom:20}}>
          <label style={lbl}>Due Date</label>
          <input type="date" value={dueDate} onChange={e=>setDueDate(e.target.value)} style={ipt}/>
          {dueDate&&<button onClick={()=>setDueDate("")} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:C.tm,marginTop:6,padding:0,fontFamily:"'DM Sans',sans-serif"}}>Clear date</button>}
        </div>

        <div style={{marginBottom:28}}>
          <label style={lbl}>Repeat</label>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {recurOpts.map(o=>(
              <button key={String(o.v)} onClick={()=>setRecur(o.v)} style={chip(recur===o.v)}>{o.l}</button>
            ))}
          </div>
        </div>

        <button onClick={save} className="press-btn"
          style={{border:"none",borderRadius:12,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:600,background:C.pri,color:"#fff",padding:"14px 24px",fontSize:15,width:"100%",display:"flex",alignItems:"center",justifyContent:"center"}}>
          {ex?"Save Changes":"Add To-do"}
        </button>
        {ex&&<button onClick={()=>{delTodo(ex.id);setView("home");setEdT(null);}} className="press-btn"
          style={{background:"transparent",color:C.acc,padding:"12px 24px",fontSize:14,border:"none",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:600,width:"100%",marginTop:8,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
          <Ico t="trash" sz={16} c={C.acc}/> Delete To-do
        </button>}
      </div>
    </>;
  };

  // ─── Settings Tab ───
  const SettingsTab = () => {
    const [importStatus, setImportStatus] = useState(null); // null | 'success' | 'error'
    const [showClearConfirm, setShowClearConfirm] = useState(false);
    const fileRef = useRef(null);

    const exportJSON = () => {
      const payload = { ...data, exportedAt: new Date().toISOString(), version: 1 };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `habits-backup-${today()}.json`;
      a.click();
      URL.revokeObjectURL(url);
    };

    const exportCSV = () => {
      const rows = [["Habit","Date","Value","Goal","Type","Hit"]];
      data.habits.forEach(h => {
        Object.entries(data.logs).forEach(([k, v]) => {
          if (!k.startsWith(h.id + ":")) return;
          const ds = k.split(":")[1];
          const hit = h.type==="time" ? v>=h.goal : h.type==="counter"
            ? (h.direction==="under" ? v<=h.goal : v>=h.goal)
            : v>=(h.cycle==="daily"?h.goal:1);
          rows.push([h.name, ds, v, h.goal, h.type, hit?"yes":"no"]);
        });
      });
      const csv = rows.map(r => r.map(c => `"${c}"`).join(",")).join("\n");
      const blob = new Blob([csv], { type: "text/csv" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `habits-export-${today()}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    };

    const importJSON = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const parsed = JSON.parse(ev.target.result);
          if (!parsed.habits || !parsed.logs) throw new Error("Invalid format");
          setData({ habits: parsed.habits, logs: parsed.logs, todos: parsed.todos||[] });
          setImportStatus("success");
          setTimeout(() => setImportStatus(null), 3000);
        } catch(e) {
          setImportStatus("error");
          setTimeout(() => setImportStatus(null), 3000);
        }
      };
      reader.readAsText(file);
      e.target.value = "";
    };

    const totalLogs = Object.keys(data.logs).length;
    const firstLog = Object.keys(data.logs).sort()[0]?.split(":")[1] || null;

    const sRow = (icon, label, sub, onClick, color=C.txt, right=null) => (
      <button onClick={onClick} className="press-btn"
        style={{width:"100%",background:"none",border:"none",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",
          display:"flex",alignItems:"center",gap:14,padding:"14px 0",textAlign:"left",
          borderBottom:`1px solid ${C.cb}`}}>
        <div style={{width:38,height:38,borderRadius:12,background:C.pb,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <Ico t={icon} sz={18} c={color==="danger"?C.acc:color===C.txt?C.ts:color}/>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:14,fontWeight:600,color:color==="danger"?C.acc:C.txt}}>{label}</div>
          {sub&&<div style={{fontSize:12,color:C.tm,marginTop:1}}>{sub}</div>}
        </div>
        {right&&<div style={{fontSize:12,color:C.tm,fontWeight:600}}>{right}</div>}
      </button>
    );

    return <div style={{padding:"0 20px"}} className="tab-fade">
      {/* Data summary card */}
      <div style={{background:C.card,borderRadius:16,padding:"18px 20px",marginBottom:20,boxShadow:C.sh,border:`1px solid ${C.cb}`}}>
        <div style={{fontSize:12,fontWeight:700,color:C.tm,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:14}}>Your Data</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
          {[
            {l:"Habits",v:data.habits.length},
            {l:"Log Entries",v:totalLogs},
            {l:"Tracking Since",v:firstLog?new Date(firstLog+"T00:00:00").toLocaleString("en-US",{month:"short",day:"numeric"}):"—"},
          ].map((x,i)=>(
            <div key={i} style={{textAlign:"center"}}>
              <div style={{fontSize:22,fontWeight:700,fontFamily:"'DM Serif Display',serif",color:C.pri}}>{x.v}</div>
              <div style={{fontSize:11,color:C.tm,marginTop:2}}>{x.l}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Export */}
      <div style={{background:C.card,borderRadius:16,padding:"4px 20px",marginBottom:16,boxShadow:C.sh,border:`1px solid ${C.cb}`}}>
        <div style={{fontSize:12,fontWeight:700,color:C.tm,textTransform:"uppercase",letterSpacing:"0.08em",padding:"14px 0 4px"}}>Export</div>
        {sRow("download","Export as JSON","Full backup — habits + all logs",exportJSON)}
        {sRow("download","Export as CSV","Spreadsheet-friendly log data",exportCSV)}
      </div>

      {/* Import */}
      <div style={{background:C.card,borderRadius:16,padding:"4px 20px",marginBottom:16,boxShadow:C.sh,border:`1px solid ${C.cb}`}}>
        <div style={{fontSize:12,fontWeight:700,color:C.tm,textTransform:"uppercase",letterSpacing:"0.08em",padding:"14px 0 4px"}}>Import & Restore</div>
        {sRow("upload","Import JSON Backup","Restore from a previous export",()=>fileRef.current?.click())}
        <input ref={fileRef} type="file" accept=".json" style={{display:"none"}} onChange={importJSON}/>
        {importStatus==="success"&&<div style={{padding:"10px 0",fontSize:13,color:C.ok,fontWeight:600}}>✓ Data imported successfully</div>}
        {importStatus==="error"&&<div style={{padding:"10px 0",fontSize:13,color:C.acc,fontWeight:600}}>✗ Invalid file — please use a habits JSON export</div>}
      </div>

      {/* Danger zone */}
      <div style={{background:C.card,borderRadius:16,padding:"4px 20px",marginBottom:32,boxShadow:C.sh,border:`1px solid ${C.cb}`}}>
        <div style={{fontSize:12,fontWeight:700,color:C.tm,textTransform:"uppercase",letterSpacing:"0.08em",padding:"14px 0 4px"}}>Danger Zone</div>
        {!showClearConfirm
          ? sRow("trash","Clear All Data","Permanently delete all habits and logs",()=>setShowClearConfirm(true),"danger")
          : <div style={{padding:"14px 0"}}>
              <div style={{fontSize:14,fontWeight:600,color:C.acc,marginBottom:10}}>Are you sure? This cannot be undone.</div>
              <div style={{display:"flex",gap:10}}>
                <button className="press-btn" onClick={()=>{setData({habits:[],logs:{}});setShowClearConfirm(false);}}
                  style={{flex:1,padding:"11px",borderRadius:12,background:C.acc,color:"#fff",border:"none",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:14}}>
                  Yes, delete everything
                </button>
                <button className="press-btn" onClick={()=>setShowClearConfirm(false)}
                  style={{flex:1,padding:"11px",borderRadius:12,background:C.pb,color:C.txt,border:"none",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:14}}>
                  Cancel
                </button>
              </div>
            </div>
        }
      </div>

      <div style={{textAlign:"center",fontSize:12,color:C.tm,paddingBottom:8}}>
        Data is stored locally on this device.<br/>Export regularly to avoid data loss.
      </div>
    </div>;
  };

  // ─── Bottom Nav ───
  const isSubView = view==="add"||view==="edit"||view==="stats"||view==="todoAdd"||view==="todoEdit";
  const NavBar = () => (
    <nav className="bottom-nav">
      <button className={`nav-btn ${tab==="today"&&!isSubView?"active":""}`} onClick={()=>{setTab("today");if(isSubView)setView("home");}}>
        <Ico t="home" sz={22} c={tab==="today"&&!isSubView?C.pri:C.tm}/>
        Today
      </button>
      <button className={`nav-btn ${tab==="todos"&&!isSubView?"active":""}`} onClick={()=>{setTab("todos");if(isSubView)setView("home");}}>
        <Ico t="todoList" sz={22} c={tab==="todos"&&!isSubView?C.pri:C.tm}/>
        To-do
      </button>
      <button className={`nav-btn ${tab==="heatmap"&&!isSubView?"active":""}`} onClick={()=>{setTab("heatmap");if(isSubView)setView("home");}}>
        <Ico t="grid" sz={22} c={tab==="heatmap"&&!isSubView?C.pri:C.tm}/>
        Heatmap
      </button>
      <button className={`nav-btn ${tab==="settings"&&!isSubView?"active":""}`} onClick={()=>{setTab("settings");if(isSubView)setView("home");}}>
        <Ico t="settings" sz={22} c={tab==="settings"&&!isSubView?C.pri:C.tm}/>
        Settings
      </button>
    </nav>
  );

  // ─── Render ───
  const dh=data.habits.filter(h=>h.cycle==="daily");
  const wh=data.habits.filter(h=>h.cycle==="weekly");
  const ds=new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});

  return <div style={{fontFamily:"'DM Sans',-apple-system,sans-serif",background:C.bg,minHeight:"100vh",maxWidth:480,margin:"0 auto",color:C.txt}}>

    {/* ── Sub-views (no bottom nav scroll area) ── */}
    {view==="add"&&<div className="scroll-area"><FormView existing={null}/></div>}
    {view==="edit"&&edH&&<div className="scroll-area"><FormView existing={edH}/></div>}
    {view==="stats"&&selH&&<div className="scroll-area"><Stats habit={selH}/></div>}
    {view==="todoAdd"&&<div className="scroll-area"><TodoFormView existing={null}/></div>}
    {view==="todoEdit"&&edT&&<div className="scroll-area"><TodoFormView existing={edT}/></div>}

    {/* ── Main tabs ── */}
    {!isSubView&&<>
      {tab==="today"&&<div className="scroll-area tab-fade">
        <div style={{padding:"24px 20px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:13,color:C.tm,fontWeight:500,letterSpacing:"0.04em",textTransform:"uppercase"}}>{ds}</div>
            <div style={{fontFamily:"'DM Serif Display',serif",fontSize:28,fontWeight:400,letterSpacing:"-0.02em"}}>Your Habits</div>
          </div>
          <button style={{...tBtn,background:C.pri,color:"#fff",boxShadow:C.shL}} onClick={()=>setView("add")}><Ico t="plus" sz={22} c="#fff"/></button>
        </div>
        {data.habits.length===0?
          <div style={{textAlign:"center",padding:"60px 40px",color:C.tm}}>
            <div style={{fontSize:48,marginBottom:16}}>🎯</div>
            <div style={{fontSize:17,fontWeight:600,color:C.txt,marginBottom:8}}>No habits yet</div>
            <div style={{fontSize:14,lineHeight:1.5}}>Tap the + button to create your first habit and start tracking your progress.</div>
          </div>
        :<>
          {dh.length>0&&<><div style={{fontSize:11,fontWeight:700,color:C.tm,textTransform:"uppercase",letterSpacing:"0.1em",padding:"16px 20px 8px"}}>Daily</div>{dh.map(card)}</>}
          {dh.length>0&&wh.length>0&&<div style={{height:1,background:C.cb,margin:"8px 20px 0"}}/>}
          {wh.length>0&&<><div style={{fontSize:11,fontWeight:700,color:C.tm,textTransform:"uppercase",letterSpacing:"0.1em",padding:"16px 20px 8px"}}>Weekly</div>{wh.map(card)}</>}
        </>}
      </div>}

      {tab==="todos"&&<div className="scroll-area tab-fade"><TodoTab/></div>}

      {tab==="heatmap"&&<div className="scroll-area tab-fade">
        <div style={{padding:"24px 20px 20px"}}>
          <div style={{fontSize:13,color:C.tm,fontWeight:500,letterSpacing:"0.04em",textTransform:"uppercase",marginBottom:4}}>Overview</div>
          <div style={{fontFamily:"'DM Serif Display',serif",fontSize:28,fontWeight:400,letterSpacing:"-0.02em",marginBottom:20}}>Weekly Review</div>
          <HeatmapTab/>
        </div>
      </div>}

      {tab==="settings"&&<div className="scroll-area tab-fade">
        <div style={{padding:"24px 20px 20px"}}>
          <div style={{fontSize:13,color:C.tm,fontWeight:500,letterSpacing:"0.04em",textTransform:"uppercase",marginBottom:4}}>Data</div>
          <div style={{fontFamily:"'DM Serif Display',serif",fontSize:28,fontWeight:400,letterSpacing:"-0.02em",marginBottom:20}}>Settings</div>
          <SettingsTab/>
        </div>
      </div>}
    </>}

    {confetti && <Confetti key={confetti.key} x={confetti.x} y={confetti.y} color={confetti.color}/>}
    <NavBar/>

    {/* Past-day log modal */}
    {pastLogModal&&<PastLogModal habit={pastLogModal} onClose={()=>setPastLogModal(null)}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
