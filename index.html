<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F7F5F0">
<title>Habits</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { background: #F7F5F0; font-family: 'DM Sans', -apple-system, sans-serif; color: #1B1B18; overflow-x: hidden; }
  html { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.2/Recharts.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo } = React;
const { BarChart, Bar, LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell } = Recharts;

// ─── Storage ───
const STORAGE_KEY = "habitTracker_v1";
const load = () => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { habits: [], logs: {} }; } catch { return { habits: [], logs: {} }; } };
const save = (data) => localStorage.setItem(STORAGE_KEY, JSON.stringify(data));

// ─── Date helpers ───
const fmt = (d) => { const y = d.getFullYear(); const m = String(d.getMonth()+1).padStart(2,'0'); const day = String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${day}`; };
const today = () => fmt(new Date());
const getWeekStart = (dateStr) => { const d = new Date(dateStr+"T00:00:00"); const day = d.getDay(); const diff = day===0?6:day-1; d.setDate(d.getDate()-diff); return fmt(d); };
const getDaysInRange = (start, end) => { const days=[]; const d=new Date(start+"T00:00:00"); const e=new Date(end+"T00:00:00"); while(d<=e){days.push(fmt(d));d.setDate(d.getDate()+1);} return days; };
const getWeekDays = (dateStr) => { const ws=getWeekStart(dateStr); return getDaysInRange(ws,(()=>{const d=new Date(ws+"T00:00:00");d.setDate(d.getDate()+6);return fmt(d);})()); };
const dayLabel = (dateStr) => ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"][new Date(dateStr+"T00:00:00").getDay()===0?6:new Date(dateStr+"T00:00:00").getDay()-1];
const getWeeksBack = (n) => { const weeks=[]; const d=new Date(); for(let i=n-1;i>=0;i--){const wd=new Date(d);wd.setDate(wd.getDate()-i*7);weeks.push(getWeekStart(fmt(wd)));} return [...new Set(weeks)].slice(-n); };

// ─── Theme ───
const T = {
  bg:"#F7F5F0", card:"#FFFFFF", cardBorder:"#E8E4DC", primary:"#2D6A4F", primaryLight:"#40916C",
  primaryGhost:"#D8F3DC", accent:"#E76F51", accentLight:"#F4A261", text:"#1B1B18",
  textSecondary:"#6B6B60", textMuted:"#A3A394", success:"#40916C", progressBg:"#EDEBE5",
  shadow:"0 1px 3px rgba(27,27,24,0.06), 0 1px 2px rgba(27,27,24,0.04)",
  shadowLg:"0 4px 12px rgba(27,27,24,0.08), 0 2px 4px rgba(27,27,24,0.04)",
};

// ─── Icons ───
const Icon = ({type,size=20,color=T.textSecondary}) => {
  const s={width:size,height:size,display:"inline-block"};
  const icons={
    plus:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
    chart:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>,
    back:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,
    fire:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 12c2-2.96 0-7-1-8 0 3.038-1.773 4.741-3 6-1.226 1.26-2 3.24-2 5a6 6 0 1 0 12 0c0-1.532-1.056-3.94-2-5-1.786 3-2.791 3-4 2z"/></svg>,
    trash:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
    edit:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
    minus:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>,
    clock:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
    target:<svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
  };
  return icons[type]||null;
};

const ProgressBar = ({value,max,color=T.primary}) => {
  const pct=Math.min((value/max)*100,100);
  return (
    <div style={{width:"100%",height:8,borderRadius:99,background:T.progressBg,overflow:"hidden"}}>
      <div style={{height:"100%",borderRadius:99,width:`${pct}%`,background:pct>=100?T.success:color,transition:"width 0.4s cubic-bezier(0.34,1.56,0.64,1)"}}/>
    </div>
  );
};

// ─── Styles ───
const S = {
  app:{fontFamily:"'DM Sans', -apple-system, sans-serif",background:T.bg,minHeight:"100vh",maxWidth:480,margin:"0 auto",color:T.text,paddingBottom:32,paddingTop:"env(safe-area-inset-top)"},
  header:{padding:"24px 20px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"},
  title:{fontFamily:"'DM Serif Display', serif",fontSize:28,fontWeight:400,color:T.text,letterSpacing:"-0.02em"},
  subtitle:{fontSize:13,color:T.textMuted,fontWeight:500,letterSpacing:"0.04em",textTransform:"uppercase"},
  card:{background:T.card,borderRadius:16,padding:"18px 20px",margin:"0 16px 12px",boxShadow:T.shadow,border:`1px solid ${T.cardBorder}`},
  btn:{border:"none",borderRadius:12,cursor:"pointer",fontFamily:"'DM Sans', sans-serif",fontWeight:600,transition:"all 0.15s",display:"inline-flex",alignItems:"center",justifyContent:"center",gap:6},
  btnPrimary:{background:T.primary,color:"#fff",padding:"14px 24px",fontSize:15},
  btnGhost:{background:"transparent",color:T.textSecondary,padding:"8px 12px",fontSize:14,border:"none",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:600,display:"inline-flex",alignItems:"center",gap:4},
  tapBtn:{width:52,height:52,borderRadius:14,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:18,transition:"all 0.15s"},
  input:{width:"100%",padding:"12px 16px",borderRadius:12,border:`1.5px solid ${T.cardBorder}`,fontFamily:"'DM Sans', sans-serif",fontSize:15,color:T.text,background:T.bg,outline:"none",boxSizing:"border-box"},
  label:{fontSize:12,fontWeight:600,color:T.textSecondary,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6,display:"block"},
  chip:(a)=>({padding:"8px 16px",borderRadius:99,border:`1.5px solid ${a?T.primary:T.cardBorder}`,background:a?T.primaryGhost:"transparent",color:a?T.primary:T.textSecondary,fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}),
  sectionLabel:{fontSize:11,fontWeight:700,color:T.textMuted,textTransform:"uppercase",letterSpacing:"0.1em",padding:"16px 20px 8px"},
  separator:{height:1,background:T.cardBorder,margin:"8px 20px 0"},
};

// ─── App ───
function App() {
  const [data, setData] = useState(load);
  const [view, setView] = useState("home");
  const [selectedHabit, setSelectedHabit] = useState(null);
  const [editHabit, setEditHabit] = useState(null);

  useEffect(() => { save(data); }, [data]);

  const todayStr = today();
  const weekDays = useMemo(() => getWeekDays(todayStr), [todayStr]);

  const getLog = useCallback((hid, date) => data.logs[`${hid}:${date}`] || 0, [data.logs]);

  const addHabit = useCallback((h) => setData(p => ({...p,habits:[...p.habits,{...h,id:Date.now().toString()}]})), []);
  const updateHabit = useCallback((id, u) => setData(p => ({...p,habits:p.habits.map(h=>h.id===id?{...h,...u}:h)})), []);
  const deleteHabit = useCallback((id) => setData(p => ({...p,habits:p.habits.filter(h=>h.id!==id),logs:Object.fromEntries(Object.entries(p.logs).filter(([k])=>!k.startsWith(id+":")))})), []);

  const getStreak = useCallback((habit) => {
    let streak = 0;
    if (habit.cycle === "daily") {
      const d = new Date();
      for (let i=0;i<365;i++) {
        const ds=fmt(d); const val=getLog(habit.id,ds);
        if (habit.type==="time"?val>=habit.goal:val>=habit.goal) streak++; else if(i>0) break;
        d.setDate(d.getDate()-1);
      }
    } else {
      const ws = new Date(getWeekStart(today())+"T00:00:00");
      for (let i=0;i<52;i++) {
        const wdays=getWeekDays(fmt(ws));
        const total=wdays.reduce((s,day)=>s+getLog(habit.id,day),0);
        if (habit.type==="time"?total>=habit.goal*7:total>=habit.goal) streak++; else if(i>0) break;
        ws.setDate(ws.getDate()-7);
      }
    }
    return streak;
  }, [getLog]);

  const fmtTimeVal = (mins) => { if(mins<60) return `${mins}m`; const h=Math.floor(mins/60); const m=mins%60; return m>0?`${h}h ${m}m`:`${h}h`; };
  const fmtIncrement = (mins) => { if(mins<60) return `${mins}m`; if(mins%60===0) return `${mins/60}h`; return `${Math.floor(mins/60)}h${mins%60}m`; };

  const getProgress = (habit) => {
    const tv=getLog(habit.id,todayStr);
    const wt=weekDays.reduce((s,d)=>s+getLog(habit.id,d),0);
    const isTime=habit.type==="time";
    let progress,goalDisplay,current;
    if (isTime) {
      if (habit.cycle==="daily") { progress=tv/habit.goal; current=fmtTimeVal(tv); goalDisplay=fmtTimeVal(habit.goal); }
      else { progress=wt/(habit.goal*7); current=fmtTimeVal(wt); goalDisplay=fmtTimeVal(habit.goal*7)+"/wk"; }
    } else {
      if (habit.cycle==="weekly") { progress=wt/habit.goal; current=`${wt}`; goalDisplay=`${habit.goal}×/wk`; }
      else { progress=tv/habit.goal; current=`${tv}`; goalDisplay=`${habit.goal}×/day`; }
    }
    return {progress,current,goalDisplay,tv,wt,isTime};
  };

  const handleAdd = useCallback((hid, isTime, inc) => {
    setData(p => { const k=`${hid}:${todayStr}`; const c=p.logs[k]||0; return {...p,logs:{...p.logs,[k]:c+(isTime?inc:1)}}; });
  }, [todayStr]);

  const handleSub = useCallback((hid, isTime, inc) => {
    setData(p => { const k=`${hid}:${todayStr}`; const c=p.logs[k]||0; return {...p,logs:{...p.logs,[k]:Math.max(0,c-(isTime?inc:1))}}; });
  }, [todayStr]);

  // ─── Render Card ───
  const renderCard = (habit) => {
    const {progress,current,goalDisplay,isTime}=getProgress(habit);
    const inc=habit.increment||60;
    const complete=progress>=1;
    const streak=getStreak(habit);
    return (
      <div key={habit.id} style={{...S.card,borderLeft:`4px solid ${complete?T.success:habit.color||T.primary}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
          <div style={{flex:1}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
              <span style={{fontSize:16,fontWeight:700}}>{habit.name}</span>
              {complete && <span style={{fontSize:12,background:T.primaryGhost,color:T.success,padding:"2px 8px",borderRadius:99,fontWeight:700}}>✓</span>}
            </div>
            <div style={{fontSize:13,color:T.textMuted}}>
              {isTime?current:`${current}×`} / {goalDisplay}
              {streak>0 && <span style={{marginLeft:10,color:T.accent}}>🔥 {streak} {habit.cycle==="daily"?"day":"week"} streak</span>}
            </div>
          </div>
          <button style={{...S.btnGhost,padding:"6px 8px"}} onClick={()=>{setSelectedHabit(habit);setView("stats");}}>
            <Icon type="chart" size={18} color={T.textMuted}/>
          </button>
        </div>
        <ProgressBar value={Math.min(progress,1)} max={1} color={habit.color||T.primary}/>
        <div style={{display:"flex",alignItems:"center",gap:8,marginTop:14}}>
          <button style={{...S.tapBtn,background:T.bg,border:`1.5px solid ${T.cardBorder}`}} onClick={()=>handleSub(habit.id,isTime,inc)}>
            <Icon type="minus" size={18} color={T.textSecondary}/>
          </button>
          <button style={{...S.tapBtn,flex:1,borderRadius:14,background:complete?T.primaryGhost:T.primary,color:complete?T.primary:"#fff",fontSize:15,fontWeight:700,height:48}} onClick={()=>handleAdd(habit.id,isTime,inc)}>
            {isTime?`+ ${fmtIncrement(inc)}`:"+\u00a01"}
          </button>
        </div>
      </div>
    );
  };

  // ─── Add/Edit View ───
  const AddEditView = ({existing=null}) => {
    const [name, setName] = useState(existing?.name||"");
    const [type, setType] = useState(existing?.type||"time");
    const [cycle, setCycle] = useState(existing?.cycle||"daily");
    const [goalH, setGoalH] = useState(existing&&existing.type==="time"?String(Math.floor(existing.goal/60)):"1");
    const [goalM, setGoalM] = useState(existing&&existing.type==="time"?String(existing.goal%60):"0");
    const [goalF, setGoalF] = useState(existing&&existing.type==="frequency"?String(existing.goal):"3");
    const [incMin, setIncMin] = useState(existing?.increment?String(existing.increment):"60");
    const [color, setColor] = useState(existing?.color||T.primary);
    const colors=["#2D6A4F","#264653","#E76F51","#E9C46A","#6A4C93","#1982C4","#F77F00","#8338EC"];
    const presets=[{l:"5m",v:"5"},{l:"15m",v:"15"},{l:"30m",v:"30"},{l:"1h",v:"60"}];
    const doSave=()=>{
      if(!name.trim()) return;
      const goal=type==="time"?(parseInt(goalH||0)*60+parseInt(goalM||0)):parseInt(goalF||1);
      const h={name:name.trim(),type,cycle,goal:Math.max(1,goal),increment:type==="time"?Math.max(1,parseInt(incMin||60)):undefined,color};
      if(existing) updateHabit(existing.id,h); else addHabit(h);
      setView("home"); setEditHabit(null);
    };
    return (
      <React.Fragment>
        <div style={S.header}>
          <button style={{...S.btnGhost,padding:"8px 0"}} onClick={()=>{setView(existing?"stats":"home");setEditHabit(null);}}>
            <Icon type="back" size={20} color={T.text}/><span style={{marginLeft:4,color:T.text,fontWeight:600}}>Back</span>
          </button>
        </div>
        <div style={{padding:"0 20px"}}>
          <div style={{...S.title,marginBottom:24}}>{existing?"Edit Habit":"New Habit"}</div>
          <div style={{marginBottom:20}}>
            <label style={S.label}>Habit Name</label>
            <input style={S.input} placeholder="e.g. Study, Work Out, Read..." value={name} onChange={e=>setName(e.target.value)}/>
          </div>
          <div style={{marginBottom:20}}>
            <label style={S.label}>Type</label>
            <div style={{display:"flex",gap:8}}>
              <button style={S.chip(type==="time")} onClick={()=>setType("time")}><span style={{display:"inline-flex",alignItems:"center",gap:4}}><Icon type="clock" size={14} color={type==="time"?T.primary:T.textMuted}/> Time-based</span></button>
              <button style={S.chip(type==="frequency")} onClick={()=>setType("frequency")}><span style={{display:"inline-flex",alignItems:"center",gap:4}}><Icon type="target" size={14} color={type==="frequency"?T.primary:T.textMuted}/> Frequency</span></button>
            </div>
          </div>
          <div style={{marginBottom:20}}>
            <label style={S.label}>Cycle</label>
            <div style={{display:"flex",gap:8}}>
              <button style={S.chip(cycle==="daily")} onClick={()=>setCycle("daily")}>Daily</button>
              <button style={S.chip(cycle==="weekly")} onClick={()=>setCycle("weekly")}>Weekly</button>
            </div>
          </div>
          <div style={{marginBottom:20}}>
            <label style={S.label}>{type==="time"?`Goal (per ${cycle==="daily"?"day":"day, summed weekly"})`:`Times per ${cycle==="daily"?"day":"week"}`}</label>
            {type==="time"?(
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <input style={{...S.input,width:70,textAlign:"center"}} type="number" min="0" value={goalH} onChange={e=>setGoalH(e.target.value)}/>
                <span style={{fontSize:14,color:T.textSecondary,fontWeight:500}}>hours</span>
                <input style={{...S.input,width:70,textAlign:"center"}} type="number" min="0" max="59" value={goalM} onChange={e=>setGoalM(e.target.value)}/>
                <span style={{fontSize:14,color:T.textSecondary,fontWeight:500}}>min</span>
              </div>
            ):(
              <input style={{...S.input,width:80,textAlign:"center"}} type="number" min="1" value={goalF} onChange={e=>setGoalF(e.target.value)}/>
            )}
          </div>
          {type==="time" && (
            <div style={{marginBottom:20}}>
              <label style={S.label}>Tap Increment</label>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {presets.map(p=><button key={p.v} style={S.chip(incMin===p.v)} onClick={()=>setIncMin(p.v)}>{p.l}</button>)}
              </div>
              <div style={{marginTop:10,display:"flex",gap:8,alignItems:"center"}}>
                <span style={{fontSize:13,color:T.textMuted}}>Custom:</span>
                <input style={{...S.input,width:70,textAlign:"center"}} type="number" min="1" value={incMin} onChange={e=>setIncMin(e.target.value)}/>
                <span style={{fontSize:13,color:T.textMuted}}>minutes</span>
              </div>
            </div>
          )}
          <div style={{marginBottom:28}}>
            <label style={S.label}>Color</label>
            <div style={{display:"flex",gap:8}}>
              {colors.map(c=><button key={c} onClick={()=>setColor(c)} style={{width:32,height:32,borderRadius:10,background:c,border:color===c?"3px solid "+T.text:"3px solid transparent",cursor:"pointer"}}/>)}
            </div>
          </div>
          <button style={{...S.btn,...S.btnPrimary,width:"100%"}} onClick={doSave}>{existing?"Save Changes":"Create Habit"}</button>
          {existing && <button style={{...S.btn,...S.btnGhost,width:"100%",marginTop:12,color:T.accent,justifyContent:"center"}} onClick={()=>{deleteHabit(existing.id);setView("home");setEditHabit(null);}}><Icon type="trash" size={16} color={T.accent}/> Delete Habit</button>}
        </div>
      </React.Fragment>
    );
  };

  // ─── Stats View ───
  const StatsView = ({habit}) => {
    const isTime=habit.type==="time";
    const streak=getStreak(habit);
    const fmtTime=(mins)=>{if(mins<60)return`${mins}m`;const h=Math.floor(mins/60);const m=mins%60;return m>0?`${h}h ${m}m`:`${h}h`;};
    const weekBarData=weekDays.map(d=>{const val=getLog(habit.id,d);return{day:dayLabel(d),value:val,goal:isTime?habit.goal:(habit.cycle==="daily"?habit.goal:undefined),hit:isTime?val>=habit.goal:val>=(habit.cycle==="daily"?habit.goal:1)};});
    const weeks=getWeeksBack(8);
    const trendData=weeks.map(ws=>{const wdays=getWeekDays(ws);const total=wdays.reduce((s,d)=>s+getLog(habit.id,d),0);const wd=new Date(ws+"T00:00:00");return{week:`${wd.getDate()}/${wd.getMonth()+1}`,total:isTime?Math.round(total/60*10)/10:total,weekGoal:isTime?Math.round(habit.goal*7/60*10)/10:(habit.cycle==="weekly"?habit.goal:habit.goal*7)};});
    const tv=getLog(habit.id,todayStr);
    const wt=weekDays.reduce((s,d)=>s+getLog(habit.id,d),0);
    return (
      <React.Fragment>
        <div style={S.header}>
          <button style={{...S.btnGhost,padding:"8px 0"}} onClick={()=>{setView("home");setSelectedHabit(null);}}>
            <Icon type="back" size={20} color={T.text}/><span style={{marginLeft:4,color:T.text,fontWeight:600}}>Back</span>
          </button>
          <button style={S.btnGhost} onClick={()=>{setEditHabit(habit);setView("edit");}}>
            <Icon type="edit" size={18} color={T.textSecondary}/>
          </button>
        </div>
        <div style={{padding:"0 20px"}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:24}}>
            <div style={{width:6,height:36,borderRadius:99,background:habit.color||T.primary}}/>
            <div>
              <div style={S.title}>{habit.name}</div>
              <div style={{fontSize:13,color:T.textMuted}}>{isTime?`${fmtTime(habit.goal)} per ${habit.cycle==="daily"?"day":"week"}`:`${habit.goal}× per ${habit.cycle==="daily"?"day":"week"}`}</div>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:24}}>
            {[{label:"Today",value:isTime?fmtTime(tv):`${tv}×`,icon:"clock"},{label:"This Week",value:isTime?fmtTime(wt):`${wt}×`,icon:"chart"},{label:"Streak",value:`${streak} ${habit.cycle==="daily"?"d":"w"}`,icon:"fire"}].map((s,i)=>(
              <div key={i} style={{background:T.card,borderRadius:14,padding:"14px 12px",textAlign:"center",boxShadow:T.shadow,border:`1px solid ${T.cardBorder}`}}>
                <div style={{marginBottom:6}}><Icon type={s.icon} size={18} color={habit.color||T.primary}/></div>
                <div style={{fontSize:20,fontWeight:700,color:T.text,fontFamily:"'DM Serif Display', serif"}}>{s.value}</div>
                <div style={{fontSize:11,color:T.textMuted,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",marginTop:2}}>{s.label}</div>
              </div>
            ))}
          </div>
          <div style={{...S.card,margin:"0 0 16px"}}>
            <div style={{fontSize:14,fontWeight:700,marginBottom:16,color:T.text}}>This Week</div>
            <ResponsiveContainer width="100%" height={180}>
              <BarChart data={weekBarData} barCategoryGap="20%">
                <CartesianGrid strokeDasharray="3 3" stroke={T.cardBorder} vertical={false}/>
                <XAxis dataKey="day" axisLine={false} tickLine={false} tick={{fill:T.textMuted,fontSize:12,fontWeight:500}}/>
                <YAxis hide/>
                <Tooltip contentStyle={{borderRadius:10,border:`1px solid ${T.cardBorder}`,boxShadow:T.shadow,fontFamily:"'DM Sans',sans-serif",fontSize:13}} formatter={(val,name)=>name==="goal"?(isTime?fmtTime(val):`${val}× goal`):(isTime?fmtTime(val):`${val}×`)}/>
                {(isTime||habit.cycle==="daily") && <Bar dataKey="goal" radius={[6,6,6,6]} fill={T.progressBg}/>}
                <Bar dataKey="value" radius={[6,6,6,6]}>{weekBarData.map((e,i)=><Cell key={i} fill={e.hit?(habit.color||T.primary):T.textMuted+"40"}/>)}</Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>
          <div style={{...S.card,margin:"0 0 16px"}}>
            <div style={{fontSize:14,fontWeight:700,marginBottom:16,color:T.text}}>{isTime?"Weekly Hours":"Weekly Completions"} — 8 Week Trend</div>
            <ResponsiveContainer width="100%" height={180}>
              <LineChart data={trendData}>
                <CartesianGrid strokeDasharray="3 3" stroke={T.cardBorder} vertical={false}/>
                <XAxis dataKey="week" axisLine={false} tickLine={false} tick={{fill:T.textMuted,fontSize:11,fontWeight:500}}/>
                <YAxis hide/>
                <Tooltip contentStyle={{borderRadius:10,border:`1px solid ${T.cardBorder}`,boxShadow:T.shadow,fontFamily:"'DM Sans',sans-serif",fontSize:13}} formatter={(val,name)=>name==="total"?(isTime?`${val}h`:`${val}×`):(isTime?`${val}h goal`:`${val}× goal`)}/>
                <Line type="monotone" dataKey="weekGoal" stroke={T.textMuted} strokeDasharray="6 3" strokeWidth={1.5} dot={false}/>
                <Line type="monotone" dataKey="total" stroke={habit.color||T.primary} strokeWidth={2.5} dot={{r:4,fill:habit.color||T.primary,strokeWidth:0}} activeDot={{r:6}}/>
              </LineChart>
            </ResponsiveContainer>
          </div>
        </div>
      </React.Fragment>
    );
  };

  // ─── Home ───
  const dailyHabits=data.habits.filter(h=>h.cycle==="daily");
  const weeklyHabits=data.habits.filter(h=>h.cycle==="weekly");
  const homeDateStr=new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});

  return (
    <div style={S.app}>
      {view==="home" && (
        <React.Fragment>
          <div style={S.header}>
            <div>
              <div style={S.subtitle}>{homeDateStr}</div>
              <div style={S.title}>Your Habits</div>
            </div>
            <button style={{...S.tapBtn,background:T.primary,color:"#fff",boxShadow:T.shadowLg}} onClick={()=>setView("add")}>
              <Icon type="plus" size={22} color="#fff"/>
            </button>
          </div>
          {data.habits.length===0?(
            <div style={{textAlign:"center",padding:"60px 40px",color:T.textMuted}}>
              <div style={{fontSize:48,marginBottom:16}}>🎯</div>
              <div style={{fontSize:17,fontWeight:600,color:T.text,marginBottom:8}}>No habits yet</div>
              <div style={{fontSize:14,lineHeight:1.5}}>Tap the + button to create your first habit and start tracking your progress.</div>
            </div>
          ):(
            <React.Fragment>
              {dailyHabits.length>0 && <React.Fragment><div style={S.sectionLabel}>Daily</div>{dailyHabits.map(renderCard)}</React.Fragment>}
              {dailyHabits.length>0 && weeklyHabits.length>0 && <div style={S.separator}/>}
              {weeklyHabits.length>0 && <React.Fragment><div style={S.sectionLabel}>Weekly</div>{weeklyHabits.map(renderCard)}</React.Fragment>}
            </React.Fragment>
          )}
        </React.Fragment>
      )}
      {view==="add" && <AddEditView/>}
      {view==="edit" && editHabit && <AddEditView existing={editHabit}/>}
      {view==="stats" && selectedHabit && <StatsView habit={selectedHabit}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
